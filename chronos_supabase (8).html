<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronos — Monitoramento de Estágio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Epilogue:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f3ee; --surface: #ffffff; --surface2: #f0ede6; --border: #e2ddd4;
  --text: #1a1714; --muted: #8a8278;
  --ok: #1a7a4a; --ok-light: #e8f5ee; --warn: #c47a0a; --warn-light: #fef7e6;
  --danger: #c0392b; --danger-light: #fdecea; --info: #1a5fa8; --info-light: #e8f0fc;
  --pause: #6b4fa8; --pause-light: #f0ebfc;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Epilogue', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── Telas (screens) ── */
.screen { display: none; }
.screen.active { display: block; }

/* ── Menu principal / Login ── */
.gate { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 20px; }
.gate-brand { text-align: center; margin-bottom: 40px; }
.gate-brand .logo { font-size: 2.6rem; font-weight: 900; letter-spacing: -2px; }
.gate-brand .logo em { font-style: normal; color: var(--info); }
.gate-brand .tag { font-family: 'DM Mono', monospace; font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-top: 6px; }
.menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; width: 100%; max-width: 620px; }
@media (max-width: 560px) { .menu-grid { grid-template-columns: 1fr; } }
.menu-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 32px 26px; cursor: pointer; transition: all 0.18s; text-align: left; }
.menu-card:hover { border-color: var(--text); transform: translateY(-3px); box-shadow: 0 14px 40px rgba(26,23,20,0.10); }
.menu-card .mc-ico { font-size: 2.2rem; margin-bottom: 14px; }
.menu-card .mc-title { font-size: 1.3rem; font-weight: 900; letter-spacing: -0.5px; }
.menu-card .mc-sub { font-size: 0.8rem; color: var(--muted); margin-top: 6px; line-height: 1.5; }
.menu-card .mc-go { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--info); margin-top: 16px; font-weight: 500; }

.auth-box { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 34px 30px; width: 100%; max-width: 400px; box-shadow: 0 14px 44px rgba(26,23,20,0.08); }
.auth-ico { font-size: 1.8rem; margin-bottom: 8px; }
.auth-title { font-size: 1.35rem; font-weight: 900; letter-spacing: -0.5px; }
.auth-sub { font-size: 0.78rem; color: var(--muted); margin: 6px 0 22px; line-height: 1.5; }
.auth-link { background: none; border: none; color: var(--info); font-family: 'Epilogue', sans-serif; font-size: 0.8rem; font-weight: 600; cursor: pointer; padding: 0; }
.auth-link:hover { text-decoration: underline; }
.auth-foot { margin-top: 18px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }

/* ── Layout do app ── */
.shell { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
@media (max-width: 720px) { .shell { grid-template-columns: 1fr; } .sidebar { position: static; height: auto; } }
.sidebar { background: #26a9a6; color: #ffffff; padding: 32px 20px; display: flex; flex-direction: column; gap: 4px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.brand { font-size: 1.05rem; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 6px; line-height: 1.2; }
.brand em { display: block; font-style: normal; font-weight: 300; font-size: 0.72rem; color: rgba(255,255,255,0.82); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
.who { background: rgba(255,255,255,0.16); border-radius: 10px; padding: 10px 12px; margin: 12px 0 8px; font-size: 0.74rem; }
.who .who-role { font-family: 'DM Mono', monospace; font-size: 0.62rem; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.8); }
.who .who-name { color: #ffffff; font-weight: 600; margin-top: 2px; }
.nav-group { font-size: 0.6rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.68); font-family: 'DM Mono', monospace; margin: 18px 0 6px 8px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; font-size: 0.82rem; font-weight: 500; color: rgba(255,255,255,0.9); cursor: pointer; border: none; background: transparent; width: 100%; text-align: left; transition: all 0.15s; }
.nav-item:hover { background: rgba(255,255,255,0.16); color: #ffffff; }
.nav-item.active { background: #ffffff; color: #0f6b68; font-weight: 700; box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
.nav-item .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 2px rgba(255,255,255,0.25); }
.nav-item .logout-ico { width: 16px; height: 16px; flex-shrink: 0; color: #ffffff; margin-left: -2px; }
.nav-item.nav-logout { font-weight: 800; color: #ffffff; }
.nav-item.active .dot { box-shadow: 0 0 0 2px rgba(15,107,104,0.12); }
.side-foot { margin-top: auto; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.25); }

.main { padding: 40px 44px; }
@media (max-width: 720px) { .main { padding: 28px 20px; } }
.page { display: none; animation: fadeIn 0.2s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
.ph { margin-bottom: 28px; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 12px; }
.ph-title { font-size: 2rem; font-weight: 900; letter-spacing: -1px; line-height: 1; }
.ph-sub { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 14px; }
.card-label { font-size: 0.62rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 16px; }
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.g3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 14px; }
.g4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 14px; }
@media (max-width: 640px) { .g2, .g3, .g4 { grid-template-columns: 1fr 1fr; } }
.sbox { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px; }
.sbox-val { font-size: 1.5rem; font-weight: 900; font-family: 'DM Mono', monospace; letter-spacing: -1px; }
.sbox-label { font-size: 0.68rem; color: var(--muted); margin-top: 4px; font-weight: 500; }
.sbox.ok { border-color: #b8ddc8; background: var(--ok-light); } .sbox.ok .sbox-val { color: var(--ok); }
.sbox.warn { border-color: #f5d08a; background: var(--warn-light); } .sbox.warn .sbox-val { color: var(--warn); }
.sbox.danger { border-color: #f5b8b2; background: var(--danger-light); } .sbox.danger .sbox-val { color: var(--danger); }
.sbox.info { border-color: #b8cef5; background: var(--info-light); } .sbox.info .sbox-val { color: var(--info); }

.field { margin-bottom: 14px; }
.field-label { font-size: 0.72rem; font-weight: 600; color: var(--muted); margin-bottom: 5px; display: block; }
.inp { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.9rem; outline: none; transition: border 0.15s; width: 100%; }
.inp:focus { border-color: var(--text); }
.inp-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
select.inp { font-family: 'Epilogue', sans-serif; }

.btn { padding: 10px 20px; border: none; border-radius: 10px; font-family: 'Epilogue', sans-serif; font-size: 0.82rem; font-weight: 700; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 7px; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--text); color: var(--bg); } .btn-primary:hover { background: #2a2520; }
.btn-ok { background: var(--ok); color: white; } .btn-warn { background: var(--warn); color: white; }
.btn-danger { background: var(--danger); color: white; } .btn-info { background: var(--info); color: white; }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1.5px solid var(--border); } .btn-ghost:hover { border-color: var(--text); }
.btn-full { width: 100%; justify-content: center; }
.btn-sm { padding: 6px 12px; font-size: 0.74rem; border-radius: 8px; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
.subtabs { display: inline-flex; gap: 4px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 4px; margin-bottom: 18px; flex-wrap: wrap; }
.subtab { border: none; background: transparent; color: var(--muted); font-family: 'Epilogue', sans-serif; font-size: 0.82rem; font-weight: 700; padding: 8px 16px; border-radius: 9px; cursor: pointer; transition: all 0.15s; }
.subtab:hover { color: var(--text); }
.subtab.active { background: var(--surface); color: #0f6b68; box-shadow: 0 1px 4px rgba(26,23,20,0.1); }

.chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; border-radius: 99px; font-size: 0.68rem; font-weight: 700; font-family: 'DM Mono', monospace; }
.chip::before { content:''; width:6px; height:6px; border-radius:50%; background: currentColor; }
.chip.ok { background: var(--ok-light); color: var(--ok); border: 1px solid #b8ddc8; }
.chip.warn { background: var(--warn-light); color: var(--warn); border: 1px solid #f5d08a; }
.chip.info { background: var(--info-light); color: var(--info); border: 1px solid #b8cef5; }
.chip.danger { background: var(--danger-light); color: var(--danger); border: 1px solid #f5b8b2; }
.chip.idle { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
.tag-sys { display:inline-block; font-family:'DM Mono',monospace; font-size:0.64rem; font-weight:500; padding:2px 8px; border-radius:6px; background:var(--surface2); color:var(--muted); border:1px solid var(--border); margin:2px 3px 2px 0; }

.tbl { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.tbl th { text-align: left; font-size: 0.62rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); font-family: 'DM Mono', monospace; padding: 0 12px 10px; border-bottom: 1px solid var(--border); }
.tbl td { padding: 11px 12px; border-bottom: 1px solid var(--surface2); }
.tbl tr:last-child td { border-bottom: none; }
.empty { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 0.85rem; }

.checks { display: flex; gap: 8px; flex-wrap: wrap; }
.check { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
.check input { accent-color: var(--info); }

/* ── Avisos (toast) + confirmação (modal) ── */
#toastWrap { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; width: min(92vw, 430px); pointer-events: none; }
.toast { pointer-events: auto; background: var(--surface); border: 1px solid var(--border); border-left: 5px solid var(--info); border-radius: 12px; box-shadow: 0 10px 34px rgba(26,23,20,0.16); padding: 13px 14px; display: flex; gap: 11px; align-items: flex-start; animation: toastIn .24s ease; }
.toast.ok { border-left-color: var(--ok); } .toast.warn { border-left-color: var(--warn); } .toast.danger { border-left-color: var(--danger); } .toast.info { border-left-color: var(--info); }
.toast-ico { font-size: 1.15rem; } .toast-body { flex: 1; color: var(--text); font-size: .86rem; line-height: 1.5; white-space: pre-line; }
.toast-close { cursor: pointer; color: var(--muted); font-weight: 700; border: none; background: none; font-size: .95rem; line-height: 1; }
.toast.hide { animation: toastOut .22s ease forwards; }
@keyframes toastIn { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes toastOut { to { opacity: 0; transform: translateY(-12px); } }
#confirmOverlay, #planoOverlay, #demandaOverlay, #diaOverlay, #detalheOverlay, #senhaOverlay { position: fixed; inset: 0; background: rgba(26,23,20,0.45); z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px; }
#confirmOverlay.show, #planoOverlay.show, #demandaOverlay.show, #diaOverlay.show, #detalheOverlay.show, #senhaOverlay.show { display: flex; }
/* Calendário de atividades */
.cal-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.cal-month { font-weight: 800; font-size: 1.05rem; letter-spacing: -0.5px; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
.cal-dow { text-align: center; font-size: 0.6rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); font-family: 'DM Mono', monospace; padding-bottom: 2px; }
.cal-cell { min-height: 78px; border: 1px solid var(--border); border-radius: 10px; padding: 6px; background: var(--surface); display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
.cal-cell.empty { border: none; background: transparent; }
.cal-cell.has { cursor: pointer; transition: all 0.12s; }
.cal-cell.has:hover { border-color: var(--text); box-shadow: 0 3px 10px rgba(26,23,20,0.10); transform: translateY(-1px); }
.cal-cell.today { border-color: var(--info); box-shadow: 0 0 0 1.5px var(--info) inset; }
.cal-num { font-size: 0.76rem; font-weight: 700; color: var(--muted); font-family: 'DM Mono', monospace; }
.cal-cell.today .cal-num { color: var(--info); }
.cal-badges { display: flex; flex-direction: column; gap: 3px; }
.cal-badge { font-size: 0.62rem; font-weight: 700; font-family: 'DM Mono', monospace; padding: 2px 5px; border-radius: 5px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cal-badge.ok { background: var(--ok-light); color: var(--ok); }
.cal-badge.warn { background: var(--warn-light); color: var(--warn); }
.cal-badge.info { background: var(--info-light); color: var(--info); }
.cal-badge.soft { opacity: 0.85; font-weight: 600; }
.cal-badge.fer { background: var(--pause-light); color: var(--pause); }
.cal-badge.pend { background: var(--warn-light); color: var(--warn); }
.cal-badge.prova { background: #efeaff; color: #6b46e5; font-weight: 700; }
.cal-cell.prova-day { border-color: #7c5cff; box-shadow: 0 0 0 1.5px #7c5cff inset; }
.cal-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--surface2); font-size: 0.72rem; color: var(--muted); }
.cal-leg { display: inline-flex; align-items: center; gap: 5px; }
.cal-dot { width: 8px; height: 8px; border-radius: 50%; }
@media (max-width: 640px) {
  .cal-grid { gap: 3px; }
  .cal-cell { min-height: 58px; padding: 3px; border-radius: 7px; }
  .cal-badge { font-size: 0.54rem; padding: 1px 3px; }
  .cal-num { font-size: 0.66rem; }
}
.confirm-box { background: var(--surface); border-radius: 16px; box-shadow: 0 24px 64px rgba(26,23,20,0.30); max-width: 440px; width: 100%; padding: 24px; border-top: 5px solid var(--info); animation: toastIn .2s ease; }
.confirm-box.danger { border-top-color: var(--danger); }
.confirm-ico { font-size: 1.7rem; margin-bottom: 8px; }
.confirm-title { font-weight: 800; font-size: 1.05rem; margin-bottom: 8px; }
.confirm-text { color: var(--muted); font-size: .87rem; line-height: 1.6; white-space: pre-line; margin-bottom: 20px; }
.confirm-actions { display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap; }
.note { font-size: 0.75rem; color: var(--muted); line-height: 1.6; }
.pill-info { background: var(--info-light); border: 1px solid #b8cef5; color: #12457a; border-radius: 12px; padding: 14px 16px; font-size: 0.8rem; line-height: 1.6; }
.pill-warn { background: var(--warn-light); border: 1px solid #f0cf8a; color: #8a5a00; border-radius: 12px; padding: 12px 14px; font-size: 0.8rem; line-height: 1.55; display: flex; gap: 9px; align-items: flex-start; }
.pill-warn .pw-ico { flex-shrink: 0; font-size: 1rem; line-height: 1.4; }
/* ── Kanban de demandas ── */
.kanban { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; align-items: start; }
@media (max-width: 860px) { .kanban { grid-template-columns: 1fr; } }
.kcol { background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; padding: 12px; min-height: 90px; transition: background .15s, border-color .15s; }
.kcol.dragover { border-color: var(--info); background: var(--info-light); }
.kcol-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 2px 4px; }
.kcol-title { display: flex; align-items: center; gap: 7px; font-size: 0.72rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); font-family: 'DM Mono', monospace; }
.kcol-dot { width: 9px; height: 9px; border-radius: 50%; }
.kcol-count { background: var(--surface); border: 1px solid var(--border); border-radius: 99px; padding: 1px 9px; font-size: 0.7rem; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--muted); }
.kcard { background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--info); border-radius: 10px; padding: 12px 13px; margin-bottom: 10px; cursor: pointer; box-shadow: 0 1px 3px rgba(26,23,20,0.05); }
.kcard:last-child { margin-bottom: 0; }
.kcard:active { cursor: grabbing; }
.kcard.dragging { opacity: 0.45; }
.kcard.prio-baixa { border-left-color: var(--ok); }
.kcard.prio-media { border-left-color: var(--warn); }
.kcard.prio-alta  { border-left-color: var(--danger); }
.kcard.minha { box-shadow: 0 0 0 2px var(--info), 0 1px 3px rgba(26,23,20,0.05); }
.kcard-top { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 8px; }
.prio-chip { font-size: 0.6rem; font-weight: 700; font-family: 'DM Mono', monospace; padding: 2px 8px; border-radius: 99px; white-space: nowrap; }
.prio-chip.baixa { background: var(--ok-light); color: var(--ok); }
.prio-chip.media { background: var(--warn-light); color: var(--warn); }
.prio-chip.alta  { background: var(--danger-light); color: var(--danger); }
.minha-selo { font-size: 0.58rem; font-weight: 800; font-family: 'DM Mono', monospace; color: var(--info); background: var(--info-light); border: 1px solid #b8cef5; padding: 2px 8px; border-radius: 99px; white-space: nowrap; }
.kcard-prog { display: flex; align-items: center; gap: 7px; margin-top: 9px; }
.kcard-prog-bar { flex: 1; height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
.kcard-prog-bar span { display: block; height: 100%; background: var(--ok); border-radius: 99px; transition: width .2s; }
.kcard-prog-txt { font-size: 0.62rem; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--muted); }
.kcard-expand { background: none; border: none; color: var(--info); font-family: 'Epilogue', sans-serif; font-size: 0.72rem; font-weight: 600; cursor: pointer; padding: 8px 0 0; text-align: left; }
.kcard-expand:hover { text-decoration: underline; }
.kcard-detalhe { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border); }
.kcard-desc { font-size: 0.78rem; color: var(--text); line-height: 1.5; white-space: pre-wrap; margin-bottom: 8px; }
.kcard-check { display: flex; flex-direction: column; gap: 5px; }
.ksub { display: flex; align-items: flex-start; gap: 7px; font-size: 0.78rem; cursor: pointer; line-height: 1.4; }
.ksub input { accent-color: var(--ok); margin-top: 2px; flex-shrink: 0; }
.ksub.done span { text-decoration: line-through; color: var(--muted); }
.kb-filtros { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.kb-filtros .inp { flex: 1; min-width: 150px; font-family: 'Epilogue', sans-serif; }
textarea.inp { width: 100%; line-height: 1.5; }
.sub-add { display: flex; gap: 8px; align-items: center; }
.sub-add .inp { flex: 1; }
.sub-edit { display: flex; align-items: center; justify-content: space-between; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; margin-bottom: 6px; }
.sub-edit .ksub { flex: 1; }
.kb-spacer { flex: 1; }
.kcard-acts { display: flex; align-items: center; gap: 4px; margin-top: 11px; padding-top: 10px; border-top: 1px solid var(--surface2); }
/* Modal de detalhes da demanda */
.det-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 12px; }
.det-titulo { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.5px; line-height: 1.25; }
.det-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 16px; }
.det-sec { margin-bottom: 18px; }
.det-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 7px; }
.det-desc { font-size: 0.88rem; line-height: 1.6; white-space: pre-wrap; }
.det-checkhead { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.det-checklist { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
.det-sub { display: flex; align-items: center; justify-content: space-between; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; }
.det-sub .ksub { flex: 1; }
.det-sub-acts { display: flex; gap: 4px; flex-shrink: 0; }
.det-sub-inp { flex: 1; }
.kcard-title { font-weight: 700; font-size: 0.9rem; line-height: 1.35; margin-bottom: 9px; }
.kcard-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.kcard-resp { display: inline-flex; align-items: center; gap: 5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; padding: 2px 9px; font-size: 0.7rem; font-weight: 600; }
.kcard-date { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); }
.kcard-acts { display: flex; gap: 4px; margin-top: 11px; padding-top: 10px; border-top: 1px solid var(--surface2); }
.kbtn { flex: none; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 4px 8px; font-size: 0.72rem; cursor: pointer; color: var(--text); line-height: 1; }
.kbtn:hover { border-color: var(--text); }
.kbtn.grow { flex: 1; text-align: center; }
.kcol-empty { text-align: center; color: var(--muted); font-size: 0.76rem; padding: 18px 8px; border: 1.5px dashed var(--border); border-radius: 10px; }
.parc-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; margin-bottom: 6px; font-size: 0.84rem; }
.parc-row .parc-info { font-family: 'DM Mono', monospace; }
.parc-empty { color: var(--muted); font-size: 0.8rem; text-align: center; padding: 10px; }
.parc-x { cursor: pointer; border: none; background: none; color: var(--danger); font-weight: 700; font-size: 0.95rem; line-height: 1; }

<script>
'use strict';
// ════════════════════════════════════════════
//  CONSTANTES E ARMAZENAMENTO
// ════════════════════════════════════════════
const BASE_MIN = 330;   // 5h30 trabalhadas/dia (base do banco de horas)
const LIMITE_MIN = 360; // 6h — limite legal da jornada de 6h
// (campo de sistemas removido — não se aplica ao monitoramento de estágio)

// ════════════════════════════════════════════
//  SUPABASE — cliente, cache e sincronização
// ════════════════════════════════════════════
const SUPABASE_URL  = 'https://gzsdkaxshqkbratwoaef.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd6c2RrYXhzaHFrYnJhdHdvYWVmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MDEyMDAsImV4cCI6MjA5OTA3NzIwMH0.z4qmwNOm3h-_Fv0hMjPWRRSCV1t-TytmQk5bhOrG2iM';
// Login por e-mail corporativo (estagiários via Supabase Auth; gestão via código/tabela).
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// Chaves lógicas (agora identificam caches, não mais o localStorage)
const K_COLAB = 'colab', K_REG = 'reg', K_FERIAS = 'ferias', K_DEMANDAS = 'demandas', K_GESTORES = 'gestores', K_PROVAS = 'provas', K_SESS = 'sess';
const _cache = { colab: [], reg: [], ferias: [], demandas: [], gestores: [], provas: [] };
const _snap  = { colab: {}, reg: {}, ferias: {}, demandas: {}, gestores: {}, provas: {} }; // id -> json (para diff de sincronização)
const _matId = {}; // matrícula -> id (uuid do perfil), inclusive de removidos

// A camada de renderização continua lendo destes caches de forma síncrona.
const loadColab    = () => _cache.colab;
const loadReg      = () => _cache.reg;
const loadFerias   = () => _cache.ferias;
const loadDemandas = () => _cache.demandas;
const loadGestores = () => _cache.gestores;
const loadProvas   = () => _cache.provas;

let session = null; // { role:'gestao'|'estagiario', matricula?, nome?, id? }

function matToId(m) { const c = _cache.colab.find(x => x.matricula === m); return c ? c._id : (_matId[m] || null); }
function idToMat(id) { const c = _cache.colab.find(x => x._id === id); return c ? c.matricula : null; }
const hhmm = (t) => t ? String(t).slice(0, 5) : '';

// ── Carrega todos os dados do Supabase para os caches (chamado no login) ──
async function carregarTudo() {
  const { data: perfis, error: e1 } = await sb.from('perfis')
    .select('id,matricula,nome,email,instituicao,periodo,criado_em').eq('papel', 'estagiario').eq('ativo', true);
  if (e1) throw e1;
  _cache.colab = (perfis || []).map(p => {
    _matId[p.matricula] = p.id;
    return { _id: p.id, matricula: p.matricula, nome: p.nome, email: p.email || '', instituicao: p.instituicao || '', periodo: p.periodo || '', criadoEm: p.criado_em };
  });

  const { data: regs, error: e2 } = await sb.from('registros')
    .select('id,estagiario_id,data,dia_semana,entrada,saida,intervalo_min,net_min,saldo_min,credito_min,debito_min,status,plano_tipo,plano_obs,obs,criado_em,registro_parcelas(data,minutos)');
  if (e2) throw e2;
  _cache.reg = (regs || []).map(mapRegFromDb);

  const { data: fer, error: e3 } = await sb.from('ferias').select('id,estagiario_id,data_ini,data_fim,obs,criado_em');
  if (e3) throw e3;
  _cache.ferias = (fer || []).map(f => ({ id: f.id, matricula: idToMat(f.estagiario_id), dataIni: f.data_ini, dataFim: f.data_fim, obs: f.obs || '', criadoEm: f.criado_em }));

  const { data: prov, error: e6 } = await sb.from('provas').select('id,estagiario_id,data,registrado_em');
  if (e6) throw e6;
  _cache.provas = (prov || []).map(p => ({ id: p.id, matricula: idToMat(p.estagiario_id), data: p.data, registradoEm: p.registrado_em }));

  const { data: dem, error: e4 } = await sb.from('demandas')
    .select('id,titulo,descricao,estagiario_id,data,status,prioridade,ordem,criado_em,demanda_subtarefas(id,texto,feita,ordem)');
  if (e4) throw e4;
  _cache.demandas = (dem || []).map(mapDemFromDb);

  const { data: ges, error: e5 } = await sb.from('gestores').select('id,nome,matricula,email,senha,ativo,criado_em').eq('ativo', true);
  if (e5) throw e5;
  _cache.gestores = (ges || []).map(g => ({ id: g.id, nome: g.nome, matricula: g.matricula || '', email: g.email, senha: g.senha, criadoEm: g.criado_em }));

  snapshotAll();
}
function mapRegFromDb(r) {
  return { id: r.id, matricula: idToMat(r.estagiario_id), date: r.data, dow: r.dia_semana || dowOf(r.data),
    entrada: hhmm(r.entrada), saida: hhmm(r.saida), intervalo: r.intervalo_min, netMin: r.net_min,
    saldo: r.saldo_min, credito: r.credito_min, debito: r.debito_min, status: r.status,
    planoTipo: r.plano_tipo || undefined, planoObs: r.plano_obs || '', obs: r.obs || '', criadoEm: r.criado_em,
    parcelas: (r.registro_parcelas || []).map(p => ({ data: p.data, minutos: p.minutos })) };
}
function mapDemFromDb(d) {
  return { id: d.id, titulo: d.titulo, descricao: d.descricao || '', matricula: idToMat(d.estagiario_id) || '',
    data: d.data || '', status: d.status, prioridade: d.prioridade, criadoEm: d.criado_em,
    subtarefas: (d.demanda_subtarefas || []).slice().sort((a, b) => (a.ordem || 0) - (b.ordem || 0)).map(s => ({ id: s.id, texto: s.texto, feita: s.feita })) };
}
function snapshotKey(key, arr, idFn) { _snap[key] = {}; arr.forEach(r => { _snap[key][idFn(r)] = JSON.stringify(r); }); }
function snapshotAll() {
  snapshotKey('colab', _cache.colab, c => c.matricula);
  snapshotKey('reg', _cache.reg, r => r.id);
  snapshotKey('ferias', _cache.ferias, f => f.id);
  snapshotKey('demandas', _cache.demandas, d => d.id);
  snapshotKey('gestores', _cache.gestores, g => g.id);
  snapshotKey('provas', _cache.provas, p => p.id);
}

// ── Gravação: atualiza o cache (otimista) e sincroniza com o Supabase ──
function saveJSON(key, arr) {
  if (key === K_SESS) return;            // a sessão é gerida pelo Supabase Auth
  _cache[key] = arr;
  sincronizar(key, arr).catch(err => notify('Falha ao salvar no servidor: ' + (err.message || err), 'danger'));
}
async function sincronizar(key, arr) {
  if (key === K_COLAB)    return syncColab(arr);
  if (key === K_REG)      return syncReg(arr);
  if (key === K_FERIAS)   return syncFerias(arr);
  if (key === K_DEMANDAS) return syncDemandas(arr);
  if (key === K_GESTORES) return syncGestores(arr);
  if (key === K_PROVAS)   return syncProvas(arr);
}
async function syncProvas(arr) {
  const ids = new Set(arr.map(p => p.id));
  for (const p of arr) {
    if (_snap.provas[p.id] !== JSON.stringify(p)) {
      const { error } = await sb.from('provas').upsert({ id: p.id, estagiario_id: matToId(p.matricula), data: p.data, registrado_em: p.registradoEm || new Date().toISOString() });
      if (error) throw error;
    }
  }
  for (const id in _snap.provas) { if (!ids.has(id)) { const { error } = await sb.from('provas').delete().eq('id', id); if (error) throw error; } }
  snapshotKey('provas', arr, p => p.id);
}
async function syncGestores(arr) {
  const ids = new Set(arr.map(g => g.id));
  for (const g of arr) {
    if (_snap.gestores[g.id] !== JSON.stringify(g)) {
      const { error } = await sb.from('gestores').upsert({ id: g.id, nome: g.nome, matricula: g.matricula || null, email: g.email, senha: g.senha });
      if (error) throw error;
    }
  }
  for (const id in _snap.gestores) { if (!ids.has(id)) { const { error } = await sb.from('gestores').update({ ativo: false }).eq('id', id); if (error) throw error; } }
  snapshotKey('gestores', arr, g => g.id);
}
async function syncColab(arr) {
  const atuais = new Set(arr.map(c => c.matricula));
  for (const c of arr) {
    if (_snap.colab[c.matricula] !== JSON.stringify(c) && c._id) {
      const { error } = await sb.from('perfis').update({ nome: c.nome, instituicao: c.instituicao || null, periodo: c.periodo || null }).eq('id', c._id);
      if (error) throw error;
    }
  }
  for (const mat in _snap.colab) {
    if (!atuais.has(mat) && _matId[mat]) {
      const { error } = await sb.from('perfis').update({ ativo: false }).eq('id', _matId[mat]); // desativa (não apaga o usuário do Auth)
      if (error) throw error;
    }
  }
  snapshotKey('colab', arr, c => c.matricula);
}
async function syncReg(arr) {
  const ids = new Set(arr.map(r => r.id));
  for (const r of arr) {
    if (_snap.reg[r.id] !== JSON.stringify(r)) {
      const row = { id: r.id, estagiario_id: matToId(r.matricula), data: r.date, dia_semana: r.dow,
        entrada: r.entrada || null, saida: r.saida || null, intervalo_min: r.intervalo || 0,
        net_min: r.netMin || 0, saldo_min: r.saldo || 0, credito_min: r.credito || 0, debito_min: r.debito || 0,
        status: r.status || 'ok', plano_tipo: r.planoTipo || null, plano_obs: r.planoObs || null, obs: r.obs || null };
      const { error } = await sb.from('registros').upsert(row);
      if (error) throw error;
      await sb.from('registro_parcelas').delete().eq('registro_id', r.id);
      const ps = (r.parcelas || []).map(p => ({ registro_id: r.id, data: p.data, minutos: p.minutos }));
      if (ps.length) { const { error: e2 } = await sb.from('registro_parcelas').insert(ps); if (e2) throw e2; }
    }
  }
  for (const id in _snap.reg) { if (!ids.has(id)) { const { error } = await sb.from('registros').delete().eq('id', id); if (error) throw error; } }
  snapshotKey('reg', arr, r => r.id);
}
async function syncFerias(arr) {
  const ids = new Set(arr.map(f => f.id));
  for (const f of arr) {
    if (_snap.ferias[f.id] !== JSON.stringify(f)) {
      const { error } = await sb.from('ferias').upsert({ id: f.id, estagiario_id: matToId(f.matricula), data_ini: f.dataIni, data_fim: f.dataFim, obs: f.obs || null });
      if (error) throw error;
    }
  }
  for (const id in _snap.ferias) { if (!ids.has(id)) { const { error } = await sb.from('ferias').delete().eq('id', id); if (error) throw error; } }
  snapshotKey('ferias', arr, f => f.id);
}
async function syncDemandas(arr) {
  const ids = new Set(arr.map(d => d.id));
  for (const d of arr) {
    if (_snap.demandas[d.id] !== JSON.stringify(d)) {
      const row = { id: d.id, titulo: d.titulo, descricao: d.descricao || null, estagiario_id: d.matricula ? matToId(d.matricula) : null,
        data: d.data || null, status: d.status || 'pendente', prioridade: d.prioridade || 'media' };
      const { error } = await sb.from('demandas').upsert(row);
      if (error) throw error;
      await sb.from('demanda_subtarefas').delete().eq('demanda_id', d.id);
      const subs = (d.subtarefas || []).map((s, i) => ({ id: s.id, demanda_id: d.id, texto: s.texto, feita: !!s.feita, ordem: i }));
      if (subs.length) { const { error: e2 } = await sb.from('demanda_subtarefas').insert(subs); if (e2) throw e2; }
    }
  }
  for (const id in _snap.demandas) { if (!ids.has(id)) { const { error } = await sb.from('demandas').delete().eq('id', id); if (error) throw error; } }
  snapshotKey('demandas', arr, d => d.id);
}

// ════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
function toMin(t) { if (!t) return 0; const [h, m] = t.split(':').map(Number); return h * 60 + (m || 0); }
function fmtDur(m) { m = Math.max(0, Math.round(m)); if (m === 0) return '0 min'; const h = Math.floor(m / 60), mm = m % 60; if (h === 0) return mm + 'min'; return mm === 0 ? h + 'h' : h + 'h ' + String(mm).padStart(2, '0'); }
function fmtSaldo(m) { const a = Math.abs(Math.round(m)); if (a === 0) return 'equilibrado'; return (m > 0 ? '+' : '−') + fmtDur(a); }
function fmtDate(iso) { if (!iso) return '—'; const [y, m, d] = iso.split('-'); return d + '/' + m + '/' + y; }
function todayISO() { const n = new Date(), p = x => String(x).padStart(2, '0'); return n.getFullYear() + '-' + p(n.getMonth() + 1) + '-' + p(n.getDate()); }
const DOW = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
function dowOf(iso) { const d = new Date(iso + 'T00:00:00'); return DOW[d.getDay()]; }
const MESES = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

function statusDia(netMin) { if (netMin > LIMITE_MIN) return 'danger'; if (netMin > BASE_MIN) return 'comp'; if (netMin < BASE_MIN) return 'fazer'; return 'ok'; }

// ── Dia de Prova: meta reduzida (3h) em datas cadastradas com >= 48h de antecedência ──
const PROVA_MIN = 180;   // 3h — metade da carga diária
function horasAteData(dateISO) { const [y, mo, dd] = dateISO.split('-').map(Number); return (new Date(y, mo - 1, dd, 0, 0, 0, 0).getTime() - Date.now()) / 3600000; }
function provaValidaObj(p) { if (!p) return false; const reg = p.registradoEm ? new Date(p.registradoEm).getTime() : 0; const [y, mo, dd] = p.data.split('-').map(Number); const alvo = new Date(y, mo - 1, dd, 0, 0, 0, 0).getTime(); return reg <= alvo - 48 * 3600000; }
function provasVisiveis() { const all = loadProvas(); if (session.role === 'gestao') return all; return all.filter(p => p.matricula === session.matricula); }
function provaDe(matricula, dateISO) { return loadProvas().find(p => p.matricula === matricula && p.data === dateISO); }
function provaValidaDe(matricula, dateISO) { return provaValidaObj(provaDe(matricula, dateISO)); }
function metaDoDia(matricula, dateISO) { return provaValidaDe(matricula, dateISO) ? PROVA_MIN : BASE_MIN; }
function statusDiaMeta(netMin, meta) { if (netMin > LIMITE_MIN) return 'danger'; if (netMin > meta) return 'comp'; if (netMin < meta) return 'fazer'; return 'ok'; }
// Recalcula o registro de um dia quando a prova daquele dia muda
function recomputarDiaProva(matricula, dateISO) {
  const all = loadReg();
  const r = all.find(x => x.matricula === matricula && x.date === dateISO);
  if (!r || r.status === 'ferias' || r.status === 'falta') return;
  const meta = metaDoDia(matricula, dateISO);
  r.saldo = (r.netMin || 0) - meta;
  r.credito = Math.max(0, r.saldo); r.debito = Math.max(0, -r.saldo);
  r.status = statusDiaMeta(r.netMin || 0, meta);
  saveJSON(K_REG, all);
}
async function cadastrarProva(iso) {
  if (session.role !== 'estagiario') { notify('Apenas o estagiário cadastra o próprio Dia de Prova.', 'warn'); return; }
  if (horasAteData(iso) < 48) { notify('O Dia de Prova deve ser cadastrado com no mínimo 48h de antecedência. Esta data NÃO será considerada para redução da jornada.', 'danger', 9000); return; }
  if (provaDe(session.matricula, iso)) { notify('Este dia já está cadastrado como Dia de Prova.', 'warn'); return; }
  const all = loadProvas();
  all.push({ id: uid(), matricula: session.matricula, data: iso, registradoEm: new Date().toISOString() });
  saveJSON(K_PROVAS, all);
  recomputarDiaProva(session.matricula, iso);
  notify('Dia de Prova cadastrado para ' + fmtDate(iso) + '. A jornada obrigatória neste dia passa a ser de 3h.', 'ok');
  fecharDia(); renderCalendario();
}
async function removerProva(iso) {
  const p = provaDe(session.matricula, iso); if (!p) return;
  if (!await confirmCard('Remover o Dia de Prova de ' + fmtDate(iso) + '? A jornada obrigatória volta a ser de 5h30.', { title: 'Remover Dia de Prova', danger: true, okText: 'Remover' })) return;
  saveJSON(K_PROVAS, loadProvas().filter(x => x.id !== p.id));
  recomputarDiaProva(session.matricula, iso);
  notify('Dia de Prova removido.', 'ok');
  fecharDia(); renderCalendario();
}
const ST_LABEL = { ok: 'Dentro de 5h30', comp: 'A compensar', fazer: 'A fazer', danger: 'Acima do limite' };
const ST_CHIP  = { ok: 'ok', comp: 'info', fazer: 'warn', danger: 'danger' };

// ════════════════════════════════════════════
//  AVISOS (toast) + CONFIRMAÇÃO (modal)
// ════════════════════════════════════════════
function notify(msg, type = 'info', ms) {
  const wrap = document.getElementById('toastWrap'); if (!wrap) return;
  const icons = { info: 'ℹ️', ok: '✅', warn: '⚠️', danger: '⛔' };
  const el = document.createElement('div');
  el.className = 'toast ' + type;

function confirmCard(msg, opts = {}) {

async function cadastrarColaborador() {
  if (!session || session.role !== 'gestao') { notify('Apenas o Núcleo de Gestão pode cadastrar estagiários.', 'danger'); return; }
  const mat = document.getElementById('nvMat').value.trim();
  const nome = document.getElementById('nvNome').value.trim();
  const email = document.getElementById('nvEmail').value.trim();
  const inst = document.getElementById('nvInst').value.trim();
  const periodo = document.getElementById('nvPeriodo').value.trim();
  const p1 = document.getElementById('nvPass').value;
  if (!mat || !nome || !email) { notify('Matrícula, nome e e-mail corporativo são obrigatórios.', 'warn'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { notify('Informe um e-mail corporativo válido.', 'warn'); return; }
  if (!p1) { notify('Defina uma senha inicial para o estagiário.', 'warn'); return; }
  if (!cryptoOk()) { notify(AVISO_HTTPS, 'danger', 9000); return; }
  try {
    // Consulta a BASE (inclui inativos) para diagnóstico preciso do conflito
    const [rMat, rEmail] = await Promise.all([
      sb.from('perfis').select('id,nome,matricula,email,ativo').eq('matricula', mat),
      sb.from('perfis').select('id,nome,matricula,email,ativo').ilike('email', email)
    ]);
    const porMat = rMat.data || [], porEmail = rEmail.data || [];
    const ativoMat = porMat.find(x => x.ativo), ativoEmail = porEmail.find(x => x.ativo);
    if (ativoMat) { notify('A matrícula ' + mat + ' já está em uso por ' + (ativoMat.nome || 'um colaborador ativo') + '. Clique em "Sincronizar" para atualizar a lista.', 'danger', 9000); return; }
    if (ativoEmail) { notify('O e-mail ' + email + ' já está em uso por ' + (ativoEmail.nome || 'um colaborador ativo') + '. Clique em "Sincronizar" para atualizar a lista.', 'danger', 9000); return; }
    // Sem conflito ativo. Se houver registro DESATIVADO (soft delete), oferece reativar (recupera histórico).
    const inativo = porMat.find(x => !x.ativo) || porEmail.find(x => !x.ativo);
    if (inativo) {
      const ok = await confirmCard('Existe um cadastro desativado (' + (inativo.nome || 'sem nome') + (inativo.matricula ? ', matrícula ' + inativo.matricula : '') + ') com esta matrícula ou e-mail. Deseja reativá-lo com os novos dados? O histórico de horas dele será preservado.', { title: 'Recuperar cadastro', okText: 'Reativar' });
      if (!ok) return;
      const { error } = await sb.from('perfis').update({ nome, matricula: mat, email, senha: await hashSenha(p1), instituicao: inst || null, periodo: periodo || null, ativo: true, papel: 'estagiario' }).eq('id', inativo.id);
      if (error) throw error;
      notify('Cadastro reativado: ' + nome + ' (' + email + ').', 'ok');
    } else {
      const { error } = await sb.from('perfis').insert({ papel: 'estagiario', nome, matricula: mat, email, senha: await hashSenha(p1), instituicao: inst || null, periodo: periodo || null, ativo: true });
      if (error) throw error;
      notify('Estagiário cadastrado: ' + nome + ' (' + email + ').', 'ok');
    }
    try { await carregarTudo(); } catch (_) {}
    nav('colaboradores');
  } catch (e) {
    const raw = (e && e.message) ? e.message : String(e);
    const msg = /duplicate|unique/i.test(raw) ? 'Conflito de matrícula ou e-mail no banco. Clique em "Sincronizar" e verifique a lista.' : raw;
    notify('Falha ao cadastrar: ' + msg, 'danger', 9000);
  }
}

// ── Supabase Realtime: atualização automática entre usuários ──
let _rtChannel = null, _rtTimer = null, _precisaReRender = false;
const RT_TABELAS = ['perfis', 'registros', 'registro_parcelas', 'ferias', 'demandas', 'demanda_subtarefas', 'gestores', 'provas'];
function iniciarRealtime() {
  if (_rtChannel) return;
  try {
    let ch = sb.channel('chronos-realtime');
    RT_TABELAS.forEach(t => { ch = ch.on('postgres_changes', { event: '*', schema: 'public', table: t }, agendarRefreshRealtime); });
    ch.subscribe();
    _rtChannel = ch;
  } catch (e) { /* Realtime indisponível: o botão Sincronizar continua funcionando */ }
}
function pararRealtime() {
  if (_rtChannel) { try { sb.removeChannel(_rtChannel); } catch (e) {} _rtChannel = null; }
  if (_rtTimer) { clearTimeout(_rtTimer); _rtTimer = null; }
  _precisaReRender = false;
}
function agendarRefreshRealtime() {          // agrupa rajadas de eventos (debounce)
  if (_rtTimer) clearTimeout(_rtTimer);
  _rtTimer = setTimeout(refreshRealtime, 500);
}
async function refreshRealtime() {
  if (!session) return;
  try { await carregarTudo(); _precisaReRender = true; } catch (e) { return; }
  tentarReRenderRealtime();
}
function tentarReRenderRealtime() {
  if (!_precisaReRender) return;
  // Não re-renderiza se houver modal aberto ou campo em edição (para não atrapalhar o usuário).
  const modalAberto = document.querySelector('#confirmOverlay.show, #planoOverlay.show, #demandaOverlay.show, #diaOverlay.show, #detalheOverlay.show, #senhaOverlay.show');
  const main = document.getElementById('mainArea');
  const foco = document.activeElement;
  const editando = foco && main && main.contains(foco) && /INPUT|TEXTAREA|SELECT/.test(foco.tagName);
  if (modalAberto || editando) { setTimeout(tentarReRenderRealtime, 800); return; } // tenta de novo quando estiver seguro
  _precisaReRender = false;
  if (paginaAtual) nav(paginaAtual);
  flashSync();
}
function flashSync() {                        // pulso discreto no botão indicando atualização automática
  const btn = document.getElementById('btnSync');
  if (!btn || btn.disabled) return;
  btn.classList.add('loading');
  setTimeout(() => { if (!btn.disabled) btn.classList.remove('loading'); }, 700);
}

function resumoRegistros(regs) {
  let credito = 0, debito = 0, total = 0, dias = 0;
  regs.forEach(r => { if (r.status === 'ferias' || r.status === 'falta') return; dias++; total += r.netMin || 0; const s = (r.netMin || 0) - metaDoDia(r.matricula, r.date); if (s > 0) credito += s; else if (s < 0) debito += -s; });
  return { credito, debito, liquido: credito - debito, total, dias };
}
function salvarRegistroDia() {
  const date = document.getElementById('regData').value;
  const ent = document.getElementById('regEntrada').value;
  const sai = document.getElementById('regSaida').value;
  const interv = toMin(document.getElementById('regIntervalo').value || '00:30');
  const obs = document.getElementById('regObs').value.trim();
  if (!date) { notify('Informe a data.', 'warn'); return; }
  if (!ent || !sai) { notify('Informe entrada e saída.', 'warn'); return; }
  const netMin = Math.max(0, toMin(sai) - toMin(ent) - interv);
  const meta = metaDoDia(session.matricula, date);
  const ehProva = meta === PROVA_MIN;
  const saldo = netMin - meta;
  const rec = {
    id: uid(), matricula: session.matricula, date, dow: dowOf(date),
    entrada: ent, saida: sai, intervalo: interv, netMin,
    saldo, credito: Math.max(0, saldo), debito: Math.max(0, -saldo),
    status: statusDiaMeta(netMin, meta), obs, criadoEm: new Date().toISOString()
  };
  const all = loadReg();
  const idx = all.findIndex(r => r.matricula === session.matricula && r.date === date);
  if (idx >= 0) { rec.parcelas = all[idx].parcelas; rec.planoTipo = all[idx].planoTipo; rec.planoObs = all[idx].planoObs; rec.planoData = all[idx].planoData; all[idx] = { ...all[idx], ...rec, id: all[idx].id }; }
  else all.push(rec);
  saveJSON(K_REG, all);
  const salvoId = idx >= 0 ? all[idx].id : rec.id;
  if (rec.debito > 0 || rec.credito > 0) {
    abrirPlano(salvoId, true);   // aviso automático + agendamento da compensação/uso
  } else {
    notify('Dia registrado: ' + fmtDate(date) + ' — ' + fmtDur(netMin) + (ehProva ? ' (Dia de Prova: meta de 3h cumprida).' : ' (jornada de 5h30 cumprida).'), 'ok');
    nav('minhas-horas');
  }
}

// ── Banco de horas: aviso de débito/crédito + agendamento parcelado da compensação/uso ──
let planoRecId = null, planoFromSave = false, planoParcelas = [], planoTotal = 0, planoDeb = false;

// Compatibilidade: registros antigos guardavam uma única planoData
function parcelasDe(rec) {
  if (Array.isArray(rec.parcelas) && rec.parcelas.length) return rec.parcelas.map(p => ({ ...p }));
  if (rec.planoData) return [{ data: rec.planoData, minutos: (rec.debito || 0) > 0 ? rec.debito : rec.credito }];
  return [];
}
const somaParcelas = ps => ps.reduce((s, p) => s + (p.minutos || 0), 0);

function abrirPlano(recId, fromSave) {
  const rec = loadReg().find(r => r.id === recId);
  if (!rec) return;
  planoRecId = recId; planoFromSave = !!fromSave;
  planoDeb = (rec.debito || 0) > 0;
  planoTotal = planoDeb ? rec.debito : rec.credito;
  planoParcelas = parcelasDe(rec);
  document.getElementById('planoIco').textContent   = planoDeb ? '⏳' : '⬆️';
  document.getElementById('planoTitle').textContent = planoDeb ? 'Horas a compensar' : 'Horas de crédito';
  document.getElementById('planoText').textContent  = planoDeb
    ? `O dia ${fmtDate(rec.date)} ficou com ${fmtDur(rec.debito)} a compensar. Você pode dividir em vários dias (ex.: 1h por dia).`
    : `O dia ${fmtDate(rec.date)} gerou ${fmtDur(rec.credito)} de crédito. Você pode usar de forma parcelada (ex.: 1h a mais por dia).`;
  document.getElementById('planoDataLabel').textContent = planoDeb ? 'Data para compensar' : 'Data para usar';
  document.getElementById('planoData').value = todayISO();
  document.getElementById('planoObs').value  = rec.planoObs || '';
  renderParcelas();
  document.getElementById('planoOverlay').classList.add('show');
}
function renderParcelas() {
  const aloc = somaParcelas(planoParcelas);
  const rest = Math.max(0, planoTotal - aloc);
  const verbo = planoDeb ? 'compensar' : 'usar';
  const resumo = document.getElementById('planoResumo');
  if (rest === 0 && aloc > 0) resumo.innerHTML = `Distribuído: <strong>${fmtDur(aloc)}</strong> de ${fmtDur(planoTotal)} — total a ${verbo} coberto. ✅`;
  else resumo.innerHTML = `Total a ${verbo}: <strong>${fmtDur(planoTotal)}</strong> · já distribuído: <strong>${fmtDur(aloc)}</strong> · faltam: <strong>${fmtDur(rest)}</strong>.`;
  // sugere a próxima quantidade e a próxima data
  document.getElementById('planoQtd').value = fmtHM(Math.min(60, rest || 60));
  const lista = document.getElementById('planoLista');
  if (!planoParcelas.length) { lista.innerHTML = '<div class="parc-empty">Nenhuma parcela ainda. Adicione datas acima ou use "Distribuir 1h/dia".</div>'; return; }
  const ordenadas = [...planoParcelas].sort((a, b) => (a.data || '').localeCompare(b.data || ''));
  lista.innerHTML = ordenadas.map(p => {
    const i = planoParcelas.indexOf(p);
    return `<div class="parc-row"><span class="parc-info">${fmtDate(p.data)} — <strong>${fmtDur(p.minutos)}</strong></span><button class="parc-x" type="button" title="Remover" onclick="removeParcela(${i})">✕</button></div>`;
  }).join('');
}
function fmtHM(min) { const h = Math.floor(min / 60), m = min % 60; return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0'); }
function addParcela() {
  const data = document.getElementById('planoData').value;
  const qtd = toMin(document.getElementById('planoQtd').value);
  if (!data) { notify('Informe a data da parcela.', 'warn'); return; }
  if (qtd <= 0) { notify('Informe uma quantidade de horas maior que zero.', 'warn'); return; }
  const rest = planoTotal - somaParcelas(planoParcelas);
  if (qtd > rest) { notify('Essa quantidade ultrapassa o saldo. Faltam apenas ' + fmtDur(rest) + '.', 'warn'); return; }
  const existente = planoParcelas.find(p => p.data === data);
  if (existente) existente.minutos += qtd; else planoParcelas.push({ data, minutos: qtd });
  // avança a data sugerida para o dia seguinte
  const d = new Date(data + 'T00:00:00'); d.setDate(d.getDate() + 1);
  const p = x => String(x).padStart(2, '0');
  document.getElementById('planoData').value = d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
  renderParcelas();
}
function removeParcela(i) { planoParcelas.splice(i, 1); renderParcelas(); }
function autoDistribuir() {
  let rest = planoTotal - somaParcelas(planoParcelas);
  if (rest <= 0) { notify('O saldo já está totalmente distribuído.', 'info'); return; }
  let base = document.getElementById('planoData').value || todayISO();
  const d = new Date(base + 'T00:00:00');
  const p = x => String(x).padStart(2, '0');
  let guard = 0;
  while (rest > 0 && guard++ < 400) {
    const iso = d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
    const parcela = Math.min(60, rest);
    const ex = planoParcelas.find(x => x.data === iso);
    if (ex) ex.minutos += parcela; else planoParcelas.push({ data: iso, minutos: parcela });
    rest -= parcela;
    d.setDate(d.getDate() + 1);
  }
  renderParcelas();
}
function salvarPlano() {
  if (!planoParcelas.length) { notify('Adicione ao menos uma parcela, ou clique em "Agora não".', 'warn'); return; }
  const obs = document.getElementById('planoObs').value.trim();
  const all = loadReg(); const rec = all.find(r => r.id === planoRecId);
  if (!rec) { document.getElementById('planoOverlay').classList.remove('show'); return; }
  rec.planoTipo = planoDeb ? 'compensar' : 'usar';
  rec.parcelas = planoParcelas.map(p => ({ ...p }));
  rec.planoObs = obs;
  delete rec.planoData; // migra do formato antigo
  saveJSON(K_REG, all);
  document.getElementById('planoOverlay').classList.remove('show');
  const aloc = somaParcelas(rec.parcelas), n = rec.parcelas.length;
  planoRecId = null; planoFromSave = false; planoParcelas = [];
  notify((rec.planoTipo === 'compensar' ? 'Compensação' : 'Uso do crédito') + ' de ' + fmtDur(aloc) + ' em ' + n + ' data(s) salva.', 'ok');
  nav(session.role === 'gestao' ? 'horas' : 'minhas-horas');
}
function fecharPlano() {
  document.getElementById('planoOverlay').classList.remove('show');
  const rec = loadReg().find(r => r.id === planoRecId);
  const fromSave = planoFromSave;
  planoRecId = null; planoFromSave = false; planoParcelas = [];
  if (fromSave && rec) {
    if ((rec.debito || 0) > 0) notify('Dia registrado. Ficaram ' + fmtDur(rec.debito) + ' a compensar — você pode planejar as datas depois, em Minhas Horas.', 'warn');
    else if ((rec.credito || 0) > 0) notify('Dia registrado. Você tem ' + fmtDur(rec.credito) + ' de crédito — pode planejar o uso depois, em Minhas Horas.', 'info');
  }
  nav(session.role === 'gestao' ? 'horas' : 'minhas-horas');
}
async function excluirRegistro(id) {
  if (!await confirmCard('Apagar este registro de horas?', { title: 'Apagar registro', danger: true, okText: 'Apagar' })) return;
  const all = loadReg().filter(r => r.id !== id);
  saveJSON(K_REG, all);
  notify('Registro apagado.', 'ok');
  nav(session.role === 'gestao' ? 'horas' : 'minhas-horas');
}

function planoCell(r, editable) {
  const temSaldo = (r.debito || 0) > 0 || (r.credito || 0) > 0;
  if (r.status === 'ferias' || r.status === 'falta' || !temSaldo) return '<td style="color:var(--muted)">—</td>';
  const ps = parcelasDe(r);
  if (ps.length) {
    const usar = (r.credito || 0) > 0 && !((r.debito || 0) > 0);
    const tipoUsar = r.planoTipo ? r.planoTipo === 'usar' : usar;
    const tip = tipoUsar ? 'Usar' : 'Compensar';
    const chip = tipoUsar ? 'info' : 'warn';
    const total = ps.reduce((s, p) => s + (p.minutos || 0), 0);
    const detalhe = [...ps].sort((a, b) => (a.data || '').localeCompare(b.data || '')).map(p => fmtDate(p.data) + ': ' + fmtDur(p.minutos)).join('\n');
    const rotulo = ps.length === 1 ? (tip + ' ' + fmtDate(ps[0].data)) : (tip + ' ' + fmtDur(total) + ' · ' + ps.length + ' datas');
    return `<td><span class="chip ${chip}" title="${esc(detalhe)}">${rotulo}</span>${editable ? ` <button class="btn btn-ghost btn-sm" onclick="abrirPlano('${r.id}',false)">Alterar</button>` : ''}</td>`;
  }
  return editable
    ? `<td><button class="btn btn-ghost btn-sm" onclick="abrirPlano('${r.id}',false)">Definir datas</button></td>`
    : '<td style="color:var(--warn)">a definir</td>';
}
function tblRegs(regs, showActions) {

    regs.map(r => {

      const cor = esp ? 'var(--muted)' : (r.saldo > 0 ? 'var(--info)' : r.saldo < 0 ? 'var(--warn)' : 'var(--ok)');

// ── Calendário de atividades (painel gerencial) ──
let calMes = new Date().getMonth(), calAno = new Date().getFullYear();
const DOW_LONGO = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
const isoDe = (y, m, d) => y + '-' + String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');

function calNav(delta) {
  calMes += delta;
  if (calMes < 0) { calMes = 11; calAno--; }
  if (calMes > 11) { calMes = 0; calAno++; }
  renderCalendario();
}
function calHoje() { const n = new Date(); calMes = n.getMonth(); calAno = n.getFullYear(); renderCalendario(); }

function dadosDoMes() {
  const regs = registrosVisiveis(), ferias = feriasVisiveis(), provas = provasVisiveis();
  const diasNoMes = new Date(calAno, calMes + 1, 0).getDate();
  const porDia = {};
  for (let d = 1; d <= diasNoMes; d++) porDia[isoDe(calAno, calMes, d)] = { regs: [], ferias: [], provas: [] };
  regs.forEach(r => { if (porDia[r.date]) porDia[r.date].regs.push(r); });
  provas.forEach(p => { if (porDia[p.data]) porDia[p.data].provas.push(p); });
  ferias.forEach(f => {
    let d = new Date(f.dataIni + 'T00:00:00'); const end = new Date(f.dataFim + 'T00:00:00');
    let guard = 0;
    while (d <= end && guard++ < 500) {
      const iso = isoDe(d.getFullYear(), d.getMonth(), d.getDate());
      if (porDia[iso]) porDia[iso].ferias.push(f.matricula);
      d.setDate(d.getDate() + 1);
    }
  });
  return porDia;
}
function renderCalendario() {
  const wrap = document.getElementById('calWrap');
  if (!wrap) return;
  const porDia = dadosDoMes();
  const inicioSemana = new Date(calAno, calMes, 1).getDay();
  const diasNoMes = new Date(calAno, calMes + 1, 0).getDate();
  const hoje = todayISO();
  const dows = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
  let cells = '';
  for (let i = 0; i < inicioSemana; i++) cells += '<div class="cal-cell empty"></div>';
  for (let d = 1; d <= diasNoMes; d++) {
    const iso = isoDe(calAno, calMes, d);
    cells += cellHTML(iso, d, porDia[iso], iso === hoje);
  }
  wrap.innerHTML =
    `<div class="cal-head">
      <div class="cal-month">${MESES[calMes]} ${calAno}</div>
      <div class="btn-row">
        <button class="btn btn-ghost btn-sm" onclick="calNav(-1)" title="Mês anterior">‹</button>
        <button class="btn btn-ghost btn-sm" onclick="calHoje()">Hoje</button>
        <button class="btn btn-ghost btn-sm" onclick="calNav(1)" title="Próximo mês">›</button>
      </div>
    </div>
    <div class="cal-grid">
      ${dows.map(w => '<div class="cal-dow">' + w + '</div>').join('')}
      ${cells}
    </div>
    <div class="cal-legend">
      <span class="cal-leg"><span class="cal-dot" style="background:var(--ok)"></span> Dentro de 5h30</span>
      <span class="cal-leg"><span class="cal-dot" style="background:var(--warn)"></span> A compensar</span>
      <span class="cal-leg"><span class="cal-dot" style="background:var(--info)"></span> Crédito (a pagar)</span>
      <span class="cal-leg"><span class="cal-dot" style="background:var(--pause)"></span> 🏖️ Férias</span>
      <span class="cal-leg"><span class="cal-dot" style="background:#7c5cff"></span> 📝 Dia de Prova (3h)</span>
    </div>`;
}
function cellHTML(iso, dia, info, isToday) {

// ── Hash de senha (PBKDF2-SHA256 + salt) via Web Crypto — sem dependências ──
const _b64 = (u8) => btoa(String.fromCharCode.apply(null, u8));
const _fromB64 = (s) => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function hashSenha(senha) {
  const iter = 120000;
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const key = await crypto.subtle.importKey('raw', new TextEncoder().encode(senha), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits({ name: 'PBKDF2', salt, iterations: iter, hash: 'SHA-256' }, key, 256);
  return 'pbkdf2$' + iter + '$' + _b64(salt) + '$' + _b64(new Uint8Array(bits));
}
async function verificarSenha(senha, armazenada) {
  if (!armazenada) return false;
  if (!armazenada.startsWith('pbkdf2$')) return senha === armazenada;   // compatível com senhas antigas (texto puro)
  const [, iterS, saltB64, hashB64] = armazenada.split('$');
  const key = await crypto.subtle.importKey('raw', new TextEncoder().encode(senha), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits({ name: 'PBKDF2', salt: _fromB64(saltB64), iterations: +iterS, hash: 'SHA-256' }, key, 256);
  return _b64(new Uint8Array(bits)) === hashB64;
}
const senhaEmHash = (s) => typeof s === 'string' && s.startsWith('pbkdf2$');
const cryptoOk = () => !!(window.crypto && window.crypto.subtle);
const AVISO_HTTPS = 'Para proteger a senha, o cadastro exige acesso por HTTPS. Abra o sistema pela URL publicada (GitHub Pages) — abrir o arquivo localmente (file://) faz o navegador bloquear a criptografia da senha.';

async function cadastrarGestor() {
  const nome = document.getElementById('gsNome').value.trim();

  const email = document.getElementById('gsEmail').value.trim();
  const senha = document.getElementById('gsSenha').value;
  if (!nome || !email || !senha) { notify('Nome, e-mail e senha são obrigatórios.', 'warn'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { notify('Informe um e-mail corporativo válido.', 'warn'); return; }
  if (!cryptoOk()) { notify(AVISO_HTTPS, 'danger', 9000); return; }
  try {
    const { data } = await sb.from('gestores').select('id,nome,email,ativo').ilike('email', email);
    const rows = data || [];
    const ativo = rows.find(x => x.ativo);
    if (ativo) { notify('O e-mail ' + email + ' já está em uso por ' + (ativo.nome || 'um colaborador ativo') + '. Clique em "Sincronizar" para atualizar a lista.', 'danger', 9000); return; }
    const inativo = rows.find(x => !x.ativo);
    if (inativo) {
      const ok = await confirmCard('Existe um colaborador desativado (' + (inativo.nome || 'sem nome') + ') com este e-mail. Deseja reativá-lo com os novos dados?', { title: 'Recuperar cadastro', okText: 'Reativar' });
      if (!ok) return;
      const { error } = await sb.from('gestores').update({ nome, matricula: matricula || null, email, senha: await hashSenha(senha), ativo: true }).eq('id', inativo.id);
      if (error) throw error;
      notify('Cadastro reativado: ' + nome + '.', 'ok');
    } else {
      const { error } = await sb.from('gestores').insert({ nome, matricula: matricula || null, email, senha: await hashSenha(senha), ativo: true });
      if (error) throw error;
      notify('Colaborador do Núcleo de Gestão cadastrado.', 'ok');
    }
    try { await carregarTudo(); } catch (_) {}
    nav('colaboradores');
  } catch (e) {
    const raw = (e && e.message) ? e.message : String(e);
    const msg = /duplicate|unique/i.test(raw) ? 'Conflito de e-mail no banco. Clique em "Sincronizar" e verifique a lista.' : raw;
    notify('Falha ao cadastrar colaborador: ' + msg, 'danger', 9000);
  }
}

async function salvarGestor() {

function exportarCSV() {
  const regs = loadReg();
  if (!regs.length) { notify('Nenhum registro para exportar.', 'warn'); return; }
  const escC = v => { const s = String(v == null ? '' : v); return /[";\n\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s; };
  const head = ['Matricula', 'Colaborador', 'Data', 'Dia', 'Entrada', 'Saida', 'Intervalo (min)', 'Trabalhado (min)', 'Saldo (min)', 'Situacao', 'Plano', 'Parcelas (datas)', 'Observacao'];
  const lines = [head.join(';')];
  [...regs].sort((a, b) => (a.matricula + a.date).localeCompare(b.matricula + b.date)).forEach(r => {
    const plano = r.planoTipo === 'compensar' ? 'Compensar' : r.planoTipo === 'usar' ? 'Usar credito' : '';
    const ps = parcelasDe(r);
    const detalhe = ps.map(p => fmtDate(p.data) + ': ' + fmtDur(p.minutos)).join(' | ');
    lines.push([r.matricula, nomeColab(r.matricula), fmtDate(r.date), r.dow || '', r.entrada || '', r.saida || '', r.intervalo || 0, r.netMin || 0, r.saldo || 0, ST_LABEL[r.status] || r.status, plano, detalhe, r.obs || ''].map(escC).join(';'));
  });
  const blob = new Blob(['\ufeff' + lines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'horas_estagiarios_' + todayISO() + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  notify('CSV exportado com as horas de todos os colaboradores.', 'ok');
}

  const colab = loadColab();
  const opts = '<option value="">Todos os estagiários</option>' +
    colab.map(c => `<option value="${esc(c.matricula)}">${esc(c.nome)}</option>`).join('');
  return ph('Demandas', 'Quadro Kanban — acompanhe o andamento das atividades',
    '<button class="btn btn-primary btn-sm" onclick="abrirDemanda()">+ Nova demanda</button>') +
    `<div class="card" style="padding:14px 16px;margin-bottom:14px">
      <div class="kb-filtros">
        <input class="inp" id="kbBusca" placeholder="🔎 Buscar por título..." oninput="renderKanbanBoard()">
        <select class="inp" id="kbFiltroColab" onchange="renderKanbanBoard()">${opts}</select>
        <button class="btn btn-ghost btn-sm" type="button" onclick="limparFiltrosKb()">Limpar</button>
      </div>
    </div>
    <div class="kanban" id="kanbanBoard"></div>`;
}
afterRender.kanban = () => renderKanbanBoard();

function limparFiltrosKb() {
  const b = document.getElementById('kbBusca'), f = document.getElementById('kbFiltroColab');
  if (b) b.value = ''; if (f) f.value = '';
  renderKanbanBoard();
}
function demandasFiltradas() {
  const termo = ((document.getElementById('kbBusca') || {}).value || '').trim().toLowerCase();
  const colab = (document.getElementById('kbFiltroColab') || {}).value || '';
  return loadDemandas().filter(d => {
    if (colab && d.matricula !== colab) return false;
    if (termo && !((d.titulo || '').toLowerCase().includes(termo))) return false;
    return true;
  });
}
function renderKanbanBoard() {
  const board = document.getElementById('kanbanBoard');
  if (!board) return;
  const arr = demandasFiltradas();
  board.innerHTML = KB_COLS.map(col => {
    const cards = arr.filter(d => (d.status || 'pendente') === col.key);
    return `<div class="kcol kcol-${col.key}" ondragover="dragOverCol(event)" ondragleave="dragLeaveCol(event)" ondrop="dropCol(event,'${col.key}')">
      <div class="kcol-head">
        <div class="kcol-title"><span class="kcol-dot" style="background:${col.cor}"></span>${col.titulo}</div>
        <span class="kcol-count">${cards.length}</span>
      </div>
      ${cards.length ? cards.map(d => cardHTML(d, col.key)).join('') : '<div class="kcol-empty">Nenhuma demanda.</div>'}
    </div>`;
  }).join('');
}
function cardHTML(d, status) {
  const idx = KB_COLS.findIndex(c => c.key === status);
  const resp = d.matricula ? esc(nomeColab(d.matricula)) : '<span style="color:var(--muted)">Sem responsável</span>';
  const esq = idx > 0 ? `<button class="kbtn" title="Mover para ${KB_COLS[idx-1].titulo}" onclick="event.stopPropagation();moverStatus('${d.id}',-1)">◀</button>` : '';
  const dir = idx < KB_COLS.length - 1 ? `<button class="kbtn" title="Mover para ${KB_COLS[idx+1].titulo}" onclick="event.stopPropagation();moverStatus('${d.id}',1)">▶</button>` : '';
  const prioKey = d.prioridade || 'media';
  const prio = PRIO[prioKey] || PRIO.media;
  const minha = session.role === 'estagiario' && d.matricula === session.matricula;
  const subs = Array.isArray(d.subtarefas) ? d.subtarefas : [];
  const feitas = subs.filter(s => s.feita).length;
  let progresso = '';
  if (subs.length) {
    const pct = Math.round(feitas / subs.length * 100);
    progresso = `<div class="kcard-prog" title="${feitas} de ${subs.length} subtarefas concluídas"><div class="kcard-prog-bar"><span style="width:${pct}%"></span></div><span class="kcard-prog-txt">✓ ${feitas}/${subs.length}</span></div>`;
  }
  return `<div class="kcard prio-${prioKey}${minha ? ' minha' : ''}" draggable="true" onclick="abrirDetalhe('${d.id}')"
      ondragstart="dragStart(event,'${d.id}')" ondragend="dragEnd(event)"
      ondragover="event.preventDefault();event.stopPropagation()" ondrop="dropCard(event,'${status}','${d.id}')">
    <div class="kcard-top">
      <span class="prio-chip ${prioKey}" title="Prioridade ${prio.label}">${prio.ico} ${prio.label}</span>
      ${minha ? '<span class="minha-selo" title="Sua demanda">★ Minha</span>' : ''}
    </div>
    <div class="kcard-title">${esc(d.titulo)}</div>
    <div class="kcard-meta">
      <span class="kcard-resp">👤 ${resp}</span>
      ${d.data ? `<span class="kcard-date">📅 ${fmtDate(d.data)}</span>` : ''}
    </div>
    ${progresso}
    <div class="kcard-acts">${esq}<div class="kb-spacer"></div>${dir}</div>
  </div>`;
}

// ── Modal de DETALHES (abre ao clicar no card) ──
let detalheId = null, detEditSubId = null;
function abrirDetalhe(id) {
  detalheId = id; detEditSubId = null;
  if (!loadDemandas().some(x => x.id === id)) return;
  renderDetalhe();
  document.getElementById('detalheOverlay').classList.add('show');
}
function fecharDetalhe() { document.getElementById('detalheOverlay').classList.remove('show'); detalheId = null; detEditSubId = null; }
function renderDetalhe() {
  const d = loadDemandas().find(x => x.id === detalheId);
  if (!d) { fecharDetalhe(); return; }
  const prioKey = d.prioridade || 'media', prio = PRIO[prioKey] || PRIO.media;
  const resp = d.matricula ? esc(nomeColab(d.matricula)) : 'Sem responsável';
  const subs = Array.isArray(d.subtarefas) ? d.subtarefas : [];
  const feitas = subs.filter(s => s.feita).length;
  const pct = subs.length ? Math.round(feitas / subs.length * 100) : 0;
  const minha = session.role === 'estagiario' && d.matricula === session.matricula;

  let checklist;
  if (subs.length) {
    checklist = subs.map(s => {
      if (s.id === detEditSubId) {
        return `<div class="det-sub"><input class="inp det-sub-inp" id="detEditInp" value="${esc(s.texto)}" onkeydown="if(event.key==='Enter')detSaveEdit('${s.id}');if(event.key==='Escape')detCancelEdit()">
          <div class="det-sub-acts"><button class="kbtn" onclick="detSaveEdit('${s.id}')" title="Salvar">✓</button><button class="kbtn" onclick="detCancelEdit()" title="Cancelar">✕</button></div></div>`;
      }
      return `<div class="det-sub"><label class="ksub${s.feita ? ' done' : ''}"><input type="checkbox" ${s.feita ? 'checked' : ''} onclick="detToggleSub('${s.id}')"><span>${esc(s.texto)}</span></label>
        <div class="det-sub-acts"><button class="kbtn" onclick="detStartEdit('${s.id}')" title="Editar">✎</button><button class="kbtn" onclick="detDelSub('${s.id}')" title="Excluir">🗑</button></div></div>`;
    }).join('');
  } else {
    checklist = '<div class="parc-empty">Nenhuma subtarefa. Use o campo abaixo para adicionar (opcional).</div>';
  }

  document.getElementById('detalheBody').innerHTML =
    `<div class="det-head">
      <div class="det-titulo">${esc(d.titulo)}</div>
      <span class="prio-chip ${prioKey}" style="flex-shrink:0">${prio.ico} ${prio.label}</span>
    </div>
    <div class="det-meta">
      <span class="kcard-resp">👤 ${resp}</span>
      ${d.data ? `<span class="kcard-date">📅 ${fmtDate(d.data)}</span>` : ''}
      ${minha ? '<span class="minha-selo">★ Minha</span>' : ''}
    </div>
    <div class="det-sec">
      <div class="det-label">Descrição</div>
      <div class="det-desc">${d.descricao && d.descricao.trim() ? esc(d.descricao) : '<span style="color:var(--muted)">Sem descrição.</span>'}</div>
    </div>
    <div class="det-sec">
      <div class="det-checkhead"><div class="det-label">Checklist de subtarefas</div>${subs.length ? `<span class="kcard-prog-txt">✓ ${feitas}/${subs.length} · ${pct}%</span>` : ''}</div>
      ${subs.length ? `<div class="kcard-prog"><div class="kcard-prog-bar"><span style="width:${pct}%"></span></div></div>` : ''}
      <div class="det-checklist">${checklist}</div>
      <div class="sub-add" style="margin-top:10px">
        <input class="inp" id="detNovaSub" placeholder="Nova subtarefa..." onkeydown="if(event.key==='Enter'){event.preventDefault();detAddSub();}">
        <button class="btn btn-ghost btn-sm" type="button" onclick="detAddSub()">+ Adicionar</button>
      </div>
    </div>
    <div class="confirm-actions" style="margin-top:4px">
      <button class="btn btn-ghost btn-sm" type="button" onclick="detEditar()">✎ Editar</button>
      <button class="btn btn-danger btn-sm" type="button" onclick="detExcluir()">🗑 Excluir</button>
      <div class="kb-spacer"></div>
      <button class="btn btn-primary" type="button" onclick="fecharDetalhe()">Fechar</button>
    </div>`;
  if (detEditSubId) { const i = document.getElementById('detEditInp'); if (i) { i.focus(); i.select(); } }
}
function detMutate(fn) {
  const arr = loadDemandas(); const d = arr.find(x => x.id === detalheId); if (!d) return;
  if (!Array.isArray(d.subtarefas)) d.subtarefas = [];
  fn(d); saveJSON(K_DEMANDAS, arr); renderDetalhe(); renderKanbanBoard();
}
function detAddSub() {
  const inp = document.getElementById('detNovaSub'); const t = inp.value.trim();
  if (!t) { notify('Digite o texto da subtarefa.', 'warn'); return; }
  detMutate(d => d.subtarefas.push({ id: uid(), texto: t, feita: false }));
  const ni = document.getElementById('detNovaSub'); if (ni) ni.focus();
}
function detToggleSub(subId) { detMutate(d => { const s = d.subtarefas.find(x => x.id === subId); if (s) s.feita = !s.feita; }); }
function detDelSub(subId) { detMutate(d => { d.subtarefas = d.subtarefas.filter(x => x.id !== subId); }); }
function detStartEdit(subId) { detEditSubId = subId; renderDetalhe(); }
function detCancelEdit() { detEditSubId = null; renderDetalhe(); }
function detSaveEdit(subId) {
  const inp = document.getElementById('detEditInp'); if (!inp) return;
  const t = inp.value.trim(); if (!t) { notify('O texto não pode ficar vazio.', 'warn'); return; }
  detEditSubId = null;
  detMutate(d => { const s = d.subtarefas.find(x => x.id === subId); if (s) s.texto = t; });
}
function detEditar() { const id = detalheId; fecharDetalhe(); abrirDemanda(id); }
async function detExcluir() {
  const id = detalheId; const d = loadDemandas().find(x => x.id === id);
  if (!await confirmCard('Excluir a demanda "' + (d ? d.titulo : '') + '"?', { title: 'Excluir demanda', danger: true, okText: 'Excluir' })) return;
  saveJSON(K_DEMANDAS, loadDemandas().filter(x => x.id !== id));
  fecharDetalhe(); notify('Demanda excluída.', 'ok'); renderKanbanBoard();
}

// ── CRUD (criação/edição dos campos principais) ──
let demandaEditId = null;
function abrirDemanda(id) {
  demandaEditId = id || null;
  const colab = loadColab();
  const sel = document.getElementById('dmResp');
  const respAtual = id ? (loadDemandas().find(d => d.id === id) || {}).matricula : (session.role === 'estagiario' ? session.matricula : '');
  sel.innerHTML = '<option value="">Selecione…</option>' +
    colab.map(c => `<option value="${esc(c.matricula)}" ${c.matricula === respAtual ? 'selected' : ''}>${esc(c.nome)} (${esc(c.matricula)})</option>`).join('');
  if (id) {
    const d = loadDemandas().find(x => x.id === id) || {};
    document.getElementById('dmTitulo2').textContent = 'Editar demanda';
    document.getElementById('dmTitulo').value = d.titulo || '';
    document.getElementById('dmDescricao').value = d.descricao || '';
    document.getElementById('dmData').value = d.data || '';
    document.getElementById('dmStatus').value = d.status || 'pendente';
    document.getElementById('dmPrioridade').value = d.prioridade || 'media';
  } else {
    document.getElementById('dmTitulo2').textContent = 'Nova demanda';
    document.getElementById('dmTitulo').value = '';
    document.getElementById('dmDescricao').value = '';
    document.getElementById('dmData').value = todayISO();
    document.getElementById('dmStatus').value = 'pendente';
    document.getElementById('dmPrioridade').value = 'media';
  }
  document.getElementById('demandaOverlay').classList.add('show');
}
function fecharDemanda() { document.getElementById('demandaOverlay').classList.remove('show'); demandaEditId = null; }
function salvarDemanda() {
  const titulo = document.getElementById('dmTitulo').value.trim();
  const descricao = document.getElementById('dmDescricao').value.trim();
  const matricula = document.getElementById('dmResp').value;
  const data = document.getElementById('dmData').value;
  const status = document.getElementById('dmStatus').value;
  const prioridade = document.getElementById('dmPrioridade').value;
  if (!titulo) { notify('Informe o título da demanda.', 'warn'); return; }
  const arr = loadDemandas();
  if (demandaEditId) {
    const d = arr.find(x => x.id === demandaEditId);
    if (d) { d.titulo = titulo; d.descricao = descricao; d.matricula = matricula; d.data = data; d.status = status; d.prioridade = prioridade; }
    notify('Demanda atualizada.', 'ok');
  } else {
    arr.push({ id: uid(), titulo, descricao, matricula, data, status, prioridade, subtarefas: [], criadoEm: new Date().toISOString() });
    notify('Demanda criada.', 'ok');
  }
  saveJSON(K_DEMANDAS, arr);
  fecharDemanda();
  renderKanbanBoard();
}
function moverStatus(id, dir) {
  const arr = loadDemandas(); const d = arr.find(x => x.id === id); if (!d) return;
  const idx = KB_COLS.findIndex(c => c.key === (d.status || 'pendente'));
  const novo = KB_COLS[Math.max(0, Math.min(KB_COLS.length - 1, idx + dir))];
  d.status = novo.key;
  saveJSON(K_DEMANDAS, arr);
  renderKanbanBoard();
}

// ── Drag & drop ──
let dragId = null;
function dragStart(e, id) { dragId = id; e.dataTransfer.effectAllowed = 'move'; try { e.dataTransfer.setData('text/plain', id); } catch (_) {} e.currentTarget.classList.add('dragging'); }
function dragEnd(e) { e.currentTarget.classList.remove('dragging'); document.querySelectorAll('.kcol.dragover').forEach(c => c.classList.remove('dragover')); }
function dragOverCol(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; e.currentTarget.classList.add('dragover'); }
function dragLeaveCol(e) { if (e.currentTarget.contains(e.relatedTarget)) return; e.currentTarget.classList.remove('dragover'); }
function dropCol(e, status) { e.preventDefault(); e.currentTarget.classList.remove('dragover'); if (dragId) moverDemanda(dragId, status, null); dragId = null; }
function dropCard(e, status, beforeId) { e.preventDefault(); e.stopPropagation(); if (dragId && dragId !== beforeId) moverDemanda(dragId, status, beforeId); dragId = null; }
function moverDemanda(id, status, beforeId) {
  const arr = loadDemandas();
  const di = arr.findIndex(d => d.id === id); if (di < 0) return;
  const [d] = arr.splice(di, 1);
  d.status = status;
  if (beforeId) { const bi = arr.findIndex(x => x.id === beforeId); arr.splice(bi < 0 ? arr.length : bi, 0, d); }
  else arr.push(d);
  saveJSON(K_DEMANDAS, arr);
  renderKanbanBoard();
}

// ════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════
(async function boot() {
  try {
    // 1) Gestão: sessão mantida por flag local (login por código/tabela, sem Supabase Auth)
    if (localStorage.getItem(GESTAO_FLAG) === '1') {
      await sb.auth.signOut();
      session = { role: 'gestao', nome: 'Núcleo de Gestão' };
      await carregarTudo();
      entrarApp();
      return;
    }
    // 2) Estagiário: sessão mantida por flag local (login por tabela)
    const estKey = localStorage.getItem(EST_FLAG);
    if (estKey) {
      await sb.auth.signOut();
      const { data } = await sb.from('perfis').select('id,matricula,nome,ativo')
        .eq('matricula', estKey).eq('papel', 'estagiario').eq('ativo', true).limit(1);
      const p = data && data[0];
      if (p) {
        session = { role: 'estagiario', matricula: p.matricula || '', nome: p.nome, id: p.id };
        await carregarTudo();
        entrarApp();
        return;
      }
      localStorage.removeItem(EST_FLAG);
    }
  } catch (e) { /* sem sessão válida — permanece no menu inicial */ }
})();

// Ajusta a largura da logo do menu para casar com a do nome "Chronos"
function sincronizarLogoMenu() {
  const nome = document.querySelector('#screen-menu .gate-brand .logo');
  const logo = document.querySelector('#screen-menu .gate-logo');
  if (nome && logo && nome.offsetWidth > 0) logo.style.width = Math.round(nome.offsetWidth * 1.25) + 'px';
}
window.addEventListener('load', sincronizarLogoMenu);
window.addEventListener('resize', sincronizarLogoMenu);
if (document.fonts && document.fonts.ready) document.fonts.ready.then(sincronizarLogoMenu);
</script>
